<style>
:root{--red:#C8102E;--navy:#1F3864;--ink:#1a1d24;--muted:#6b7280;--line:#e6e8ec;--bg:#f4f5f7;--card:#fff;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:13px}
header{background:var(--red);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:18px;box-shadow:0 2px 8px rgba(0,0,0,.12)}
header img{height:42px;background:#fff;padding:4px 8px;border-radius:6px}
header .t{font-weight:800;font-size:19px;letter-spacing:.3px;line-height:1.1}
header .s{font-size:11px;opacity:.85;font-weight:500;letter-spacing:1.5px;text-transform:uppercase}
.upload{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn{background:#fff;color:var(--red);border:none;padding:9px 16px;border-radius:8px;font-weight:800;cursor:pointer;font-size:12px}
.btn:hover{background:#ffe9ec}
.btn.alt{background:rgba(255,255,255,.16);color:#fff;border:1.5px solid rgba(255,255,255,.5)}
.btn.alt:hover{background:rgba(255,255,255,.28)}
.up-note{font-size:10.5px;opacity:.9;max-width:160px;line-height:1.3}
.wrap{max-width:1280px;margin:0 auto;padding:20px 22px 40px}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;border-left:4px solid var(--navy);transition:.15s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.06)}
.kpi.green{border-left-color:#46A05A}.kpi.blue{border-left-color:#5B9BD5}.kpi.red{border-left-color:var(--red)}.kpi.orange{border-left-color:#E8743B}
.kpi .n{font-size:30px;font-weight:800;line-height:1}.kpi .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:6px;font-weight:600}
.grid{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:14px;margin-bottom:18px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
.panel h3{margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--navy);font-weight:700}
.filters{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 16px}
.filters label{font-size:11px;color:var(--muted);font-weight:600;margin-right:4px}
select,input{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
input{min-width:160px}
.clear{margin-left:auto;background:var(--navy);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px}
.tablewrap{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{background:var(--red);color:#fff;text-align:left;padding:10px 12px;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
tbody td{padding:8px 12px;border-bottom:1px solid var(--line)}
tbody tr:hover{background:#f9fafb}
.chip{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.count{font-size:11px;color:var(--muted);margin-top:10px;font-weight:600}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:10px;font-weight:700;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.2);opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.toast.err{background:var(--red)}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.up-note{display:none}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

const SC={"1. INSPECCION VEHICULO":"#9E9E9E","2. VEHICULO ASIGNADO":"#7FB3DE","3. APLICACION ANTICORROSIVO":"#5B9BD5","4. PROCESO MECANICA":"#4A86C7","5. INSTALACION ACCESORIOS":"#3B73B9","6. A ESPERAR PARA ASIGNAR A LAVADO":"#9C82C9","7. VEHICULO ASIGNADO EN LAVADO":"#00A6A6","8. PROCESO EMBELLECIMIENTO":"#1F4E8C","9. ENTREGADO A LOGISTICA":"#46A05A","ALISTAMIENTO DETENIDO":"#E8743B"};
const MESES=["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE","INICIAL"];
function norm(s){return (s==null?'':''+s).replace(/\u00a0/g,' ').trim()}
function normEstado(v){v=norm(v).toUpperCase();
  if(v.includes("DETENIDO"))return "ALISTAMIENTO DETENIDO";
  if(v.includes("ENTREGADO"))return "9. ENTREGADO A LOGISTICA";
  if(v.includes("EMBELLEC"))return "8. PROCESO EMBELLECIMIENTO";
  if(v.includes("LAVADO")&&v.includes("ASIGNAD"))return "7. VEHICULO ASIGNADO EN LAVADO";
  if(v.includes("ESPERAR")||(v.includes("ASIGNAR")&&v.includes("LAVADO")))return "6. A ESPERAR PARA ASIGNAR A LAVADO";
  if(v.includes("INSTALAC"))return "5. INSTALACION ACCESORIOS";
  if(v.includes("MEC"))return "4. PROCESO MECANICA";
  if(v.includes("ANTICORROSIVO"))return "3. APLICACION ANTICORROSIVO";
  if(v.includes("ASIGNAD"))return "2. VEHICULO ASIGNADO";
  if(v.includes("INSPEC"))return "1. INSPECCION VEHICULO";
  return norm(v)}
function groupEstado(arr){const raw=groupCount(arr,'estado');const o={};
  Object.keys(SC).forEach(k=>{if(raw[k])o[k]=raw[k]});
  Object.keys(raw).forEach(k=>{if(!(k in o))o[k]=raw[k]});return o}

function parseFecha(s){s=norm(s);if(!s)return null;
  let m=s.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){let y=+m[3];if(y<100)y+=2000;return new Date(y,(+m[2])-1,+m[1]);}
  let d=new Date(s);return isNaN(d)?null:d;}
function fmtFecha(s){const d=parseFecha(s);if(!d)return '';
  return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();}
DATA.forEach(r=>{r.estado=normEstado(r.estado)});
function chipBg(e){return (SC[e]||"#999")+"22"} function chipFg(e){return SC[e]||"#555"}
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' err':'');setTimeout(()=>t.className='toast',2600)}
function guardarDashboard(){
  try{
    const marker=/\/\*__DATA_START__\*\/[\s\S]*?\/\*__DATA_END__\*\//;
    const nuevoBloque='/*__DATA_START__*/'+JSON.stringify(DATA)+'/*__DATA_END__*/';
    if(!marker.test(ORIGINAL_HTML)){toast('No pude preparar el archivo',true);return}
    const htmlFinal='<!DOCTYPE html>\n'+ORIGINAL_HTML.replace(marker,nuevoBloque);
    const blob=new Blob([htmlFinal],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const f=new Date(); const fecha=f.toISOString().slice(0,10);
    a.href=url; a.download='dashboard_alistamiento_'+fecha+'.html';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('✔ Archivo guardado. Súbelo a OneDrive y comparte el link.');
  }catch(err){console.error(err);toast('No pude guardar el archivo',true)}
}

// ---------- subir y aplanar Excel ----------
document.getElementById('file').addEventListener('change',function(e){
  const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=function(ev){
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      let sh=wb.SheetNames.find(n=>n.toUpperCase().includes('ALISTAMIENTO'))||wb.SheetNames[0];
      const A=XLSX.utils.sheet_to_json(wb.Sheets[sh],{header:1,raw:false,defval:''});
      const parsed=flatten(A);
      if(parsed.length===0){toast('No encontré filas con OT en la hoja',true);return}
      DATA=parsed; initFilters(); render();
      toast('✔ Datos actualizados: '+parsed.length+' vehículos');
    }catch(err){console.error(err);toast('No pude leer el archivo',true)}
  };
  rd.readAsArrayBuffer(f);
});
// detecta la fila de encabezado, mapea columnas por nombre, arrastra el mes de las bandas
function flatten(A){
  // localizar fila de encabezados (la que contiene "OT" y "ESTADO")
  let hr=-1;
  for(let i=0;i<Math.min(A.length,15);i++){
    const up=A[i].map(x=>norm(x).toUpperCase());
    if(up.includes('OT')&&up.some(c=>c.includes('ESTADO'))){hr=i;break}
  }
  if(hr<0)hr=0;
  const head=A[hr].map(x=>norm(x).toUpperCase());
  const col=(...names)=>{
    for(const n of names){const i=head.findIndex(h=>h===n);if(i>=0)return i}
    for(const n of names){const i=head.findIndex(h=>h.includes(n));if(i>=0)return i}
    return -1};
  const cOT=col('OT'),cEst=col('ESTADO'),cInv=col('INVENTARIO'),cMod=col('MODELO'),
   cVit=col('VITRINA'),cCol=col('COLOR'),cCar=col('CARGO'),cSla=col('SLA'),
   cReg=col('FECHA REGISTRO','REGISTRO'),cEnt=col('FECHA EST. ENTREGA','ENTREGA');
  let mes='';
  for(let i=0;i<hr;i++){const j=(A[i]||[]).map(norm).join(' ').toUpperCase();
    const fm=MESES.find(m=>j.includes(m));if(fm)mes=fm.charAt(0)+fm.slice(1).toLowerCase();}
  let out=[];
  for(let i=hr+1;i<A.length;i++){
    const row=A[i]; if(!row)continue;
    const joined=row.map(norm).join(' ').toUpperCase();
    // banda de mes (no tiene OT numérico, pero menciona un mes)
    const found=MESES.find(m=>joined.includes(m));
    const inv=norm(row[cInv]);
    const ot=norm(row[cOT]);
    // es fila de datos si el INVENTARIO tiene contenido y la fila no es banda ni encabezado
    const esEncabezado = norm(row[cEst]).toUpperCase()==='ESTADO' || norm(row[cInv]).toUpperCase()==='INVENTARIO';
    const isData = inv!=='' && !esEncabezado;
    if(!isData){ if(found) mes=found.charAt(0)+found.slice(1).toLowerCase(); continue; }
    out.push({mes:mes||'(sin mes)',ot:ot,inv:norm(row[cInv]),modelo:norm(row[cMod]).toUpperCase(),
      vitrina:norm(row[cVit]).toUpperCase(),color:norm(row[cCol]).toUpperCase(),
      cargo:norm(row[cCar]).toUpperCase(),estado:normEstado(row[cEst]),
      sla:(cSla>=0?norm(row[cSla]):''),
      freg:(cReg>=0?norm(row[cReg]):''),fent:(cEnt>=0?norm(row[cEnt]):'')});
  }
  return out;
}

const uniq=(k)=>[...new Set(DATA.map(r=>r[k]).filter(Boolean))].sort();
function fillSel(id,vals,lbl){const s=document.getElementById(id);const cur=s.value;
  s.innerHTML='<option value="">'+lbl+'</option>'+vals.map(v=>`<option ${v===cur?'selected':''}>${v}</option>`).join('');s.onchange=render}
function initFilters(){fillSel('fMes',uniq('mes'),'Todos');fillSel('fEstado',uniq('estado'),'Todos');
  fillSel('fVitrina',uniq('vitrina'),'Todas');fillSel('fModelo',uniq('modelo'),'Todos');}
document.getElementById('fBuscar').oninput=render;
document.getElementById('fDesde').onchange=render;document.getElementById('fHasta').onchange=render;
function clearF(){['fMes','fEstado','fVitrina','fModelo','fDesde','fHasta'].forEach(i=>document.getElementById(i).value='');document.getElementById('fBuscar').value='';render()}
let charts={};
function filtered(){const ms=fMes.value,e=fEstado.value,v=fVitrina.value,m=fModelo.value,q=fBuscar.value.trim().toLowerCase();
  const d1=fDesde.value?new Date(fDesde.value):null,d2=fHasta.value?new Date(fHasta.value):null;
  return DATA.filter(r=>{const fr=parseFecha(r.freg);
   return (!ms||r.mes===ms)&&(!e||r.estado===e)&&(!v||r.vitrina===v)&&(!m||r.modelo===m)&&
    (!q||((r.ot+' '+r.inv).toLowerCase().includes(q)))&&
    (!d1||(fr&&fr>=d1))&&(!d2||(fr&&fr<=d2));})}
function groupCount(arr,k){const o={};arr.forEach(r=>{const x=r[k]||'(vacío)';o[x]=(o[x]||0)+1});return o}
function bar(id,obj,colorFn,horizontal){if(charts[id])charts[id].destroy();
  const labels=Object.keys(obj),vals=Object.values(obj);
  charts[id]=new Chart(document.getElementById(id),{type:'bar',
   data:{labels,datasets:[{data:vals,backgroundColor:labels.map(colorFn),borderRadius:5}]},
   options:{indexAxis:horizontal?'y':'x',plugins:{legend:{display:false}},
    scales:{x:{grid:{display:!horizontal},ticks:{font:{size:10}}},y:{grid:{display:horizontal},ticks:{font:{size:10}},beginAtZero:true}},
    animation:{duration:450}}})}
function kpi(n,l,c){return `<div class="kpi ${c}"><div class="n">${n}</div><div class="l">${l}</div></div>`}
function render(){
  const f=filtered();
  const tot=f.length, ent=f.filter(r=>r.estado&&r.estado.includes('ENTREGADO')).length;
  const det=f.filter(r=>r.estado==='ALISTAMIENTO DETENIDO').length;
  const proc=tot-ent, pct=tot?Math.round(ent/tot*100):0;
  document.getElementById('kpis').innerHTML=kpi(tot,'Total vehículos','red')+kpi(proc,'En proceso','blue')+kpi(ent,'Entregados','green')+kpi(pct+'%','% Entregado','')+kpi(det,'Detenidos','orange');
  bar('cEstado',groupEstado(f),l=>SC[l]||'#999',true);
  bar('cVitrina',groupCount(f,'vitrina'),()=>'#1F3864',false);
  bar('cModelo',groupCount(f,'modelo'),()=>'#C8102E',true);
  document.getElementById('tbody').innerHTML=f.map(r=>`<tr><td>${r.mes}</td><td>${r.ot}</td><td>${r.inv}</td><td>${r.modelo}</td><td>${r.color}</td><td>${r.vitrina}</td><td>${r.cargo}</td><td>${fmtFecha(r.freg)}</td><td><span class="chip" style="background:${chipBg(r.estado)};color:${chipFg(r.estado)}">${r.estado}</span></td><td style="text-align:center">${r.sla}</td><td>${fmtFecha(r.fent)}</td></tr>`).join('');
  document.getElementById('count').textContent=`Mostrando ${f.length} de ${DATA.length} vehículos`;
}
initFilters();render();
